  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SYSTEM_PROMPT = `당신은 한국회계기준원(KASB) 공식 자료, 국가법령정보센터 법령, 법원 사법정보공개포털을 기반으로 답변하는 K-IFRS 및 일반기업회계기준 전문 회계 자문 AI입니다.

[절대 규칙 - 출처 제한]
아래 3개 공식 출처의 정보만 답변에 사용합니다. 이 규칙은 어떤 경우에도 예외 없이 적용됩니다.

허용된 출처 (이 출처만 사용):
1. KASB 한국회계기준원 (kasb.or.kr): K-IFRS 기준서, 질의회신, 의결서
2. 국가법령정보센터 (www.law.go.kr): 회계·세무 관련 법령 원문
3. 법원 사법정보공개포털 (portal.scourt.go.kr): 판례, 결정문, 사법통계

금지 출처 (절대 사용 금지):
- 블로그, 뉴스 기사, 학술 논문, 회계법인 웹사이트, 세무사 사이트, 위키피디아, 네이버 지식iN 등 위 3개 출처 이외의 모든 사이트
- 웹 검색에서 위 3개 도메인(kasb.or.kr, law.go.kr, portal.scourt.go.kr) 외의 결과가 나오면 해당 정보는 답변에서 완전히 제외할 것
- 금지된 출처의 정보를 인용하거나 참고하거나 근거로 사용하는 것 일체 불가

출처 위반 시 처리:
- 허용된 3개 출처에서 답변 근거를 찾을 수 없는 경우, 추측하거나 다른 출처를 사용하지 말고 반드시 "허용된 공식 출처(KASB, 국가법령정보센터, 사법정보공개포털)에서 해당 정보를 확인할 수 없습니다. 직접 확인이 필요합니다."라고 명시할 것

[핵심 원칙]
1. 출처 명시: 모든 답변에 기준서 번호, 문단 번호, 질의회신 번호, 법률명·조항 등을 정확히 명기합니다.
2. 정확성 우선: 확인되지 않은 내용은 답변하지 않고, 확인이 필요함을 명시합니다.
3. 실무 연계: 기준서 원문 해석과 함께 실무 적용 시사점을 제공합니다.

[답변 형식]
- 질문 요약 → 기준서/법령 근거(번호·문단·조항) → 해석 및 답변 → 실무 시사점 → 출처
- 핵심 회계 용어는 영어 원문을 병기합니다 (예: 수익인식(Revenue Recognition))
- 한국어로 답변합니다
- 출처 섹션에는 반드시 해당 정보의 구체적 URL을 포함합니다:
  · 기준서: kasb.or.kr의 해당 페이지
  · 법령: https://www.law.go.kr 의 해당 법령 페이지
  · 판례: https://portal.scourt.go.kr 의 해당 판례 페이지
- 출처 섹션에 위 3개 도메인 외의 URL이 포함되어서는 절대 안 됩니다.

[K-IFRS 기준서 번호 체계]
- K-IFRS 제1001호 ~ 제1041호 (IAS 대응)
- K-IFRS 제1101호 ~ 제1117호 (IFRS 대응)
- K-IFRS 제2101호 ~ 제2121호 (IFRIC/SIC 대응)

[주요 관련 법령 (국가법령정보센터)]
- 주식회사 등의 외부감사에 관한 법률 (외감법)
- 상법 (회사편)
- 법인세법, 소득세법, 부가가치세법
- 자본시장과 금융투자업에 관한 법률
- 공인회계사법`;

    function TypingIndicator() {
      return (
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {[0, 1, 2].map((i) => (
            <div key={i} style={{
              width: 7, height: 7, borderRadius: "50%", background: "#64748b",
              animation: "kasbBounce 1.4s infinite ease-in-out",
              animationDelay: `${i * 0.16}s`,
            }} />
          ))}
        </div>
      );
    }

    function renderInline(text) {
      const parts = text.split(/(\*\*[^*]+\*\*)/g);
      return parts.map((part, i) => {
        if (part.startsWith("**") && part.endsWith("**")) {
          return <strong key={i} style={{ color: "#0f172a", fontWeight: 700 }}>{part.slice(2, -2)}</strong>;
        }
        return <span key={i}>{part}</span>;
      });
    }

    function FormatAnswer({ text }) {
      if (!text) return null;
      const lines = text.split("\n");
      return (
        <div>
          {lines.map((line, i) => {
            if (line.startsWith("### ")) return <h3 key={i} style={{ fontFamily: "'Noto Serif KR', Georgia, serif", fontSize: 15, fontWeight: 700, color: "#1e293b", margin: "20px 0 8px", borderBottom: "1px solid #e2e8f0", paddingBottom: 6 }}>{line.replace("### ", "")}</h3>;
            if (line.startsWith("## ")) return <h2 key={i} style={{ fontFamily: "'Noto Serif KR', Georgia, serif", fontSize: 17, fontWeight: 700, color: "#0f172a", margin: "24px 0 10px", borderBottom: "2px solid #334155", paddingBottom: 8 }}>{line.replace("## ", "")}</h2>;
            if (line.startsWith("# ")) return <h1 key={i} style={{ fontFamily: "'Noto Serif KR', Georgia, serif", fontSize: 19, fontWeight: 700, color: "#0f172a", margin: "24px 0 12px" }}>{line.replace("# ", "")}</h1>;
            if (line.startsWith("- ")) return <div key={i} style={{ display: "flex", gap: 8, margin: "4px 0", paddingLeft: 4 }}><span style={{ color: "#475569", fontWeight: 700, flexShrink: 0 }}>•</span><span style={{ color: "#334155", lineHeight: 1.7 }}>{renderInline(line.slice(2))}</span></div>;
            if (line.match(/^\d+\.\s/)) { const num = line.match(/^(\d+)\./)[1]; return <div key={i} style={{ display: "flex", gap: 8, margin: "4px 0", paddingLeft: 4 }}><span style={{ color: "#1e40af", fontWeight: 700, flexShrink: 0, fontFamily: "'JetBrains Mono', monospace", fontSize: 13, minWidth: 20, textAlign: "right" }}>{num}.</span><span style={{ color: "#334155", lineHeight: 1.7 }}>{renderInline(line.replace(/^\d+\.\s/, ""))}</span></div>; }
            if (line.trim() === "") return <div key={i} style={{ height: 8 }} />;
            return <p key={i} style={{ margin: "4px 0", color: "#334155", lineHeight: 1.75 }}>{renderInline(line)}</p>;
          })}
        </div>
      );
    }

    // === API Key 유효성 검증 함수 ===
    async function validateApiKey(provider, apiKey) {
      if (provider === "gemini") {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ role: "user", parts: [{ text: "Hi" }] }],
            generationConfig: { maxOutputTokens: 1 },
          }),
        });
        if (res.status === 400) {
          const err = await res.json().catch(() => null);
          if (err?.error?.message?.includes("API key")) throw new Error("API Key가 유효하지 않습니다.");
          // 400이지만 key 관련이 아니면 통과 (형식 문제 등)
          return true;
        }
        if (res.status === 401 || res.status === 403) throw new Error("API Key가 유효하지 않습니다.");
        return true;
      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1,
            messages: [{ role: "user", content: "Hi" }],
          }),
        });
        if (res.status === 401) throw new Error("API Key가 유효하지 않습니다.");
        if (res.status === 403) throw new Error("API Key 권한이 부족합니다. Key 설정을 확인해주세요.");
        return true;
      }
    }

    function ApiKeyModal({ onSave, onClose, initialProvider, initialKey }) {
      const [provider, setProvider] = useState(initialProvider || "gemini");
      const [key, setKey] = useState(initialKey || "");
      const [error, setError] = useState("");
      const [validating, setValidating] = useState(false);
      const p = PROVIDERS[provider];

      // provider 바뀌면 저장된 key 불러오기 + 오류 초기화
      useEffect(() => {
        try { setKey(localStorage.getItem(PROVIDERS[provider].storageKey) || ""); } catch { setKey(""); }
        setError("");
      }, [provider]);

      const handleSave = async () => {
        if (!key.trim() || validating) return;
        setError("");
        setValidating(true);
        try {
          await validateApiKey(provider, key.trim());
          onSave(provider, key.trim());
        } catch (err) {
          setError(err.message);
        } finally {
          setValidating(false);
        }
      };

      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(15,23,42,0.6)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <div style={{
            background: "#fff", borderRadius: 16, padding: "36px 32px",
            width: 460, maxWidth: "90vw",
            boxShadow: "0 24px 64px rgba(0,0,0,0.2)",
            position: "relative",
          }}>
            {/* 닫기 버튼 */}
            <button onClick={onClose} style={{
              position: "absolute", top: 14, right: 14,
              background: "none", border: "none", cursor: "pointer",
              color: "#94a3b8", fontSize: 20, lineHeight: 1,
              width: 32, height: 32, borderRadius: 8,
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.15s",
            }}
              onMouseOver={(e) => { e.currentTarget.style.background = "#f1f5f9"; e.currentTarget.style.color = "#475569"; }}
              onMouseOut={(e) => { e.currentTarget.style.background = "none"; e.currentTarget.style.color = "#94a3b8"; }}
            >&#10005;</button>

            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <div style={{
                width: 56, height: 56, borderRadius: 16, margin: "0 auto 16px",
                background: "linear-gradient(135deg, #1e3a5f, #3b6d9e)",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <span style={{ fontSize: 28 }}>&#128273;</span>
              </div>
              <h2 style={{
                fontFamily: "'Noto Serif KR', serif",
                fontSize: 18, fontWeight: 700, color: "#0f172a", marginBottom: 8,
              }}>API 설정</h2>
              <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6 }}>
                AI Provider를 선택하고 API Key를 입력하세요.

            </div>

            {/* Provider 선택 탭 */}
            <div style={{
              display: "flex", gap: 8, marginBottom: 20,
            }}>
              {Object.entries(PROVIDERS).map(([key, val]) => (
                <button key={key} onClick={() => setProvider(key)} style={{
                  flex: 1, padding: "10px 0", fontSize: 13, fontWeight: 600,
                  borderRadius: 10, cursor: "pointer", transition: "all 0.15s",

                  background: provider === key ? `${val.color}10` : "#fff",
                  color: provider === key ? val.color : "#64748b",
                }}>
                  <div>{val.label}</div>
                  <div style={{ fontSize: 10.5, fontWeight: 400, marginTop: 2, opacity: 0.8 }}>{val.description}</div>
                </button>
              ))}
            </div>

            {/* API Key 입력 */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 6 }}>

                type="password"

                placeholder={p.placeholder}

            <button

                width: "100%", padding: "12px 0", fontSize: 14, fontWeight: 600,
                color: "#fff", border: "none", borderRadius: 10,

                background: !key.trim() || validating
                  ? "#94a3b8"
                  : "linear-gradient(135deg, #1e3a5f, #2d5a87)",

                transition: "all 0.15s",

                <span style={{ color: "#dc2626", fontSize: 16, flexShrink: 0, lineHeight: 1 }}>&#9888;</span>
                <p style={{ fontSize: 12.5, color: "#dc2626", lineHeight: 1.5, margin: 0, fontWeight: 500 }}>

            <div style={{

              border: "1px solid #fde68a",
            }}>
              <p style={{ fontSize: 11.5, color: "#92400e", lineHeight: 1.6 }}>
                API Key는 브라우저의 localStorage에 저장되며 외부로 전송되지 않습니다.
                선택한 AI Provider의 API에만 직접 전송됩니다.
              </p>
            </div>

            <p style={{ fontSize: 11, color: "#94a3b8", textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>

              <a href={p.helpUrl} target="_blank" rel="noopener noreferrer"
                style={{ color: "#3b82f6", textDecoration: "none" }}
              >{p.helpText}</a>에서 발급받으세요.
            </p>
          </div>
        </div>
      );
    }

    // === API 호출 함수 ===
    async function callGemini(apiKey, question) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: "user", parts: [{ text: question }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 4096 },
          tools: [{ google_search: {} }],
        }),
      });
      if (response.status === 429) throw new Error("요청 한도를 초과했습니다. 1분 후 다시 시도해주세요. (Gemini 무료 Tier: 분당 10회, 일 250회)");
      if (response.status === 503) throw new Error("Gemini 서버가 일시적으로 응답하지 않습니다. 잠시 후 다시 시도해주세요.");
      if (response.status === 403 || response.status === 401) throw new Error("API Key가 유효하지 않습니다. 설정에서 다시 입력해주세요.");
      if (response.status === 400) {
        const errData = await response.json().catch(() => null);
        throw new Error(`API 호출 실패: ${errData?.error?.message || "요청 형식 오류"}`);
      }
      if (!response.ok) throw new Error(`API 호출 실패 (${response.status})`);
      const data = await response.json();
      return (data.candidates || [])
        .flatMap((c) => (c.content?.parts || []))
        .filter((p) => p.text)
        .map((p) => p.text)
        .join("\n");
    }

    async function callAnthropic(apiKey, question) {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4096,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: question }],
          tools: [{ type: "web_search_20250305", name: "web_search" }],
        }),
      });
      if (response.status === 429) throw new Error("요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.");
      if (response.status === 401) throw new Error("API Key가 유효하지 않습니다. 설정에서 다시 입력해주세요.");
      if (!response.ok) throw new Error(`API 호출 실패 (${response.status})`);
      const data = await response.json();
      return data.content
        .filter((c) => c.type === "text")
        .map((c) => c.text)
        .join("\n");
    }

    const ALLOWED_IDS = ["jk", "nathan", "qyu", "annie", "dahlia", "jamie"];

    function LoginScreen({ onLogin }) {
      const [id, setId] = useState("");
      const [error, setError] = useState("");

      const handleLogin = () => {
        const trimmed = id.trim();
        if (!trimmed) return;
        if (ALLOWED_IDS.includes(trimmed.toLowerCase())) {
          try { localStorage.setItem("kasb_user_id", trimmed); } catch {}
          onLogin(trimmed);
        } else {
          setError("등록되지 않은 ID입니다. 관리자에게 문의하세요.");
        }
      };

      return (
        <div style={{
          height: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          background: "linear-gradient(135deg, #0f2235 0%, #1e3a5f 40%, #2d5a87 100%)",
          fontFamily: "'Noto Sans KR', -apple-system, sans-serif",
        }}>
          <div style={{
            background: "#fff", borderRadius: 20, padding: "48px 40px",
            width: 420, maxWidth: "90vw",
            boxShadow: "0 32px 80px rgba(0,0,0,0.3)",
          }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{
                width: 64, height: 64, borderRadius: 20, margin: "0 auto 20px",
                background: "linear-gradient(135deg, #1e3a5f, #3b6d9e)",
                display: "flex", alignItems: "center", justifyContent: "center",
                boxShadow: "0 8px 24px rgba(30,58,95,0.3)",
              }}>
                <span style={{ fontSize: 32 }}>&#9878;</span>
              </div>
              <h1 style={{
                fontFamily: "'Noto Serif KR', serif",
                fontSize: 22, fontWeight: 700, color: "#0f172a", marginBottom: 8,
              }}>KASB 회계기준 · 법령정보 Q&A</h1>
              <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6 }}>
                한국회계기준원 · 국가법령정보센터 · 사법정보공개포털 기반
              </p>
            </div>

            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 6 }}>
                사용자 ID
              </label>
              <input
                type="text"
                value={id}
                onChange={(e) => { setId(e.target.value); setError(""); }}
                onKeyDown={(e) => { if (e.key === "Enter") handleLogin(); }}
                placeholder="ID를 입력하세요"
                style={{
                  width: "100%", padding: "14px 16px", fontSize: 15,
                  border: error ? "1.5px solid #fca5a5" : "1.5px solid #d1d5db",
                  borderRadius: 12, transition: "border-color 0.15s",
                  fontFamily: "'Noto Sans KR', sans-serif", color: "#1e293b",
                }}
                onFocus={(e) => e.target.style.borderColor = error ? "#fca5a5" : "#3b82f6"}
                onBlur={(e) => e.target.style.borderColor = error ? "#fca5a5" : "#d1d5db"}
                autoFocus
              />
            </div>

            {error && (
              <div style={{
                marginBottom: 16, padding: "10px 14px",
                background: "#fef2f2", borderRadius: 8,
                border: "1px solid #fecaca",
              }}>
                <p style={{ fontSize: 12.5, color: "#dc2626", margin: 0, fontWeight: 500 }}>
                  {error}
                </p>
              </div>
            )}

            <button onClick={handleLogin} disabled={!id.trim()} style={{
              width: "100%", padding: "14px 0", fontSize: 15, fontWeight: 600,
              color: "#fff", border: "none", borderRadius: 12,
              cursor: id.trim() ? "pointer" : "not-allowed",
              background: id.trim()
                ? "linear-gradient(135deg, #1e3a5f, #2d5a87)"
                : "#94a3b8",
              boxShadow: id.trim() ? "0 4px 16px rgba(30,58,95,0.3)" : "none",
              transition: "all 0.15s",
            }}>로그인</button>
          </div>
        </div>
      );
    }

    function KASBApp() {
      const [userId, setUserId] = useState(() => {
        try {
          const saved = localStorage.getItem("kasb_user_id") || "";
          return ALLOWED_IDS.includes(saved.toLowerCase()) ? saved : "";
        } catch { return ""; }
      });
      const [provider, setProvider] = useState(() => {
        try { return localStorage.getItem("kasb_provider") || "gemini"; } catch { return "gemini"; }
      });
      const [apiKey, setApiKey] = useState(() => {
        try {
          const prov = localStorage.getItem("kasb_provider") || "gemini";
          return localStorage.getItem(PROVIDERS[prov].storageKey) || "";
        } catch { return ""; }
      });
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [question, setQuestion] = useState("");
      const [qaList, setQaList] = useState([]);
      const [selectedIdx, setSelectedIdx] = useState(null);
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
      const answerRef = useRef(null);

      // 로그인 후 API Key 없으면 Modal 표시
      useEffect(() => {
        if (userId && !apiKey) setShowKeyModal(true);
      }, [userId]);

      useEffect(() => {
        if (answerRef.current) answerRef.current.scrollTop = 0;
      }, [selectedIdx]);

      // 로그인 안 된 상태면 LoginScreen 표시
      if (!userId) {
        return <LoginScreen onLogin={(id) => setUserId(id)} />;
      }

      const handleSaveKey = (prov, key) => {
        setProvider(prov);
        setApiKey(key);
        try {
          localStorage.setItem("kasb_provider", prov);
          localStorage.setItem(PROVIDERS[prov].storageKey, key);
        } catch {}
        setShowKeyModal(false);
      };

      const handleSubmit = async (q) => {
        const trimmed = (q || question).trim();
        if (!trimmed || loading || !apiKey) return;

        const newIdx = qaList.length;
        setQaList((prev) => [...prev, { question: trimmed, answer: null, loading: true, error: null, provider }]);
        setSelectedIdx(newIdx);
        setQuestion("");
        setLoading(true);
        if (window.innerWidth <= 768) setSidebarOpen(false);

        try {
          const text = provider === "gemini"
            ? await callGemini(apiKey, trimmed)
            : await callAnthropic(apiKey, trimmed);

          setQaList((prev) => prev.map((item, idx) =>
            idx === newIdx ? { ...item, answer: text || "답변을 생성하지 못했습니다.", loading: false } : item
          ));
        } catch (err) {
          setQaList((prev) => prev.map((item, idx) =>
            idx === newIdx ? { ...item, answer: null, loading: false, error: err.message } : item
          ));
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      };

      const handleDelete = (idx, e) => {
        e.stopPropagation();
        setQaList((prev) => prev.filter((_, i) => i !== idx));
        if (selectedIdx === idx) setSelectedIdx(null);
        else if (selectedIdx > idx) setSelectedIdx(selectedIdx - 1);
      };

      const selected = selectedIdx !== null ? qaList[selectedIdx] : null;
      const provInfo = PROVIDERS[provider];

      return (
        <div style={{
          height: "100vh", display: "flex", flexDirection: "column",
          fontFamily: "'Noto Sans KR', -apple-system, sans-serif",
          background: "#f1f5f9", overflow: "hidden",
        }}>
          {showKeyModal && (
            <ApiKeyModal
              onSave={handleSaveKey}
              onClose={() => { if (apiKey) setShowKeyModal(false); }}
              initialProvider={provider}
              initialKey={apiKey}
            />
          )}

          {/* Header */}
          <header style={{
            height: 56, flexShrink: 0,
            display: "flex", alignItems: "center", padding: "0 20px", gap: 14,
            background: "linear-gradient(135deg, #0f2235 0%, #1e3a5f 100%)",
            borderBottom: "1px solid rgba(255,255,255,0.08)",
            justifyContent: "space-between",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{
                background: "none", border: "none", cursor: "pointer", padding: 4,
                color: "rgba(255,255,255,0.7)", fontSize: 18, lineHeight: 1, display: "flex",
              }}
                onMouseOver={(e) => e.currentTarget.style.color = "#fff"}
                onMouseOut={(e) => e.currentTarget.style.color = "rgba(255,255,255,0.7)"}
              >&#9776;</button>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: "rgba(255,255,255,0.12)", display: "flex",
                alignItems: "center", justifyContent: "center",
              }}>
                <span style={{ fontSize: 16 }}>&#9878;</span>
              </div>
              <div>
                <h1 style={{
                  fontSize: 15, fontWeight: 700, color: "#f8fafc", margin: 0,
                  fontFamily: "'Noto Serif KR', serif", letterSpacing: "-0.02em",
                }}>KASB 회계기준 · 법령정보 Q&A</h1>
                <p style={{ fontSize: 10.5, color: "rgba(255,255,255,0.5)", margin: 0, marginTop: 1 }}>
                  한국회계기준원 &middot; 국가법령정보센터 &middot; 사법정보공개포털 기반
                </p>
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => setShowKeyModal(true)} style={{
                background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)",
                borderRadius: 8, padding: "6px 12px", cursor: "pointer",
                color: "rgba(255,255,255,0.7)", fontSize: 12, fontWeight: 500,
                display: "flex", alignItems: "center", gap: 6,
                transition: "all 0.15s",
              }}
                onMouseOver={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.18)"; e.currentTarget.style.color = "#fff"; }}
                onMouseOut={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.1)"; e.currentTarget.style.color = "rgba(255,255,255,0.7)"; }}
              >
                <span style={{
                  display: "inline-block", width: 8, height: 8, borderRadius: "50%",
                  background: provInfo.color, marginRight: 2,
                }}></span>
                {provInfo.label}
              </button>

              <div style={{
                display: "flex", alignItems: "center", gap: 6,
                background: "rgba(255,255,255,0.08)", borderRadius: 8,
                padding: "6px 10px",
              }}>
                <span style={{ fontSize: 12, color: "rgba(255,255,255,0.9)", fontWeight: 500 }}>{userId}</span>
                <button onClick={() => {
                  try { localStorage.removeItem("kasb_user_id"); } catch {}
                  setUserId("");
                }} style={{
                  background: "none", border: "none", cursor: "pointer",
                  color: "rgba(255,255,255,0.4)", fontSize: 11, padding: "0 2px",
                  transition: "color 0.15s",
                }}
                  onMouseOver={(e) => e.currentTarget.style.color = "#fca5a5"}
                  onMouseOut={(e) => e.currentTarget.style.color = "rgba(255,255,255,0.4)"}
                  title="로그아웃"
                >&#10005;</button>
              </div>
            </div>
          </header>

          {/* Body */}
          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            {/* Left Sidebar */}
            <aside style={{
              width: sidebarOpen ? 320 : 0, flexShrink: 0, background: "#fff",
              borderRight: sidebarOpen ? "1px solid #e2e8f0" : "none",
              display: "flex", flexDirection: "column",
              transition: "width 0.25s ease", overflow: "hidden",
            }}>
              <div style={{ padding: 14, borderBottom: "1px solid #e2e8f0", background: "#fafbfc", flexShrink: 0 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                  <textarea
                    value={question} onChange={(e) => setQuestion(e.target.value)}
                    onKeyDown={handleKeyDown} placeholder="회계기준 질문 입력..." rows={2}
                    style={{
                      flex: 1, padding: "10px 12px", fontSize: 13,
                      border: "1.5px solid #d1d5db", borderRadius: 10,
                      resize: "none", lineHeight: 1.5,
                      fontFamily: "'Noto Sans KR', sans-serif",
                      background: "#fff", color: "#1e293b", transition: "border-color 0.15s",
                    }}
                    onFocus={(e) => e.target.style.borderColor = "#3b82f6"}
                    onBlur={(e) => e.target.style.borderColor = "#d1d5db"}
                  />
                  <button onClick={() => handleSubmit()} disabled={!question.trim() || loading}
                    style={{
                      padding: "10px 14px", fontSize: 13, fontWeight: 600,
                      color: "#fff", border: "none", borderRadius: 10,
                      cursor: !question.trim() || loading ? "not-allowed" : "pointer",
                      background: !question.trim() || loading ? "#94a3b8" : "linear-gradient(135deg, #1e3a5f, #2d5a87)",
                      boxShadow: !question.trim() || loading ? "none" : "0 2px 6px rgba(30,58,95,0.25)",
                      transition: "all 0.15s", flexShrink: 0, whiteSpace: "nowrap",
                    }}
                  >{loading ? "..." : "전송"}</button>
                </div>
              </div>

              <div style={{ flex: 1, overflowY: "auto" }}>
                {qaList.length === 0 && (
                  <div style={{ padding: 20 }}>
                    <p style={{ fontSize: 12, color: "#94a3b8", textAlign: "center", marginBottom: 16 }}>
                      아래 예시 질문을 선택하거나<br />직접 질문을 입력해 보세요.
                    </p>
                    {SAMPLE_QUESTIONS.map((sq, i) => (
                      <button key={i} onClick={() => { setQuestion(sq); handleSubmit(sq); }} style={{
                        display: "block", width: "100%", padding: "10px 14px",
                        marginBottom: 6, fontSize: 12.5, lineHeight: 1.5,
                        color: "#475569", background: "#f8fafc",
                        border: "1px solid #e8ecf1", borderRadius: 8,
                        cursor: "pointer", textAlign: "left", transition: "all 0.15s",
                      }}
                        onMouseOver={(e) => { e.currentTarget.style.background = "#eef4ff"; e.currentTarget.style.borderColor = "#93c5fd"; }}
                        onMouseOut={(e) => { e.currentTarget.style.background = "#f8fafc"; e.currentTarget.style.borderColor = "#e8ecf1"; }}
                      >
                        <span style={{ color: "#3b82f6", marginRight: 6, fontSize: 11 }}>Q</span>{sq}
                      </button>
                    ))}
                  </div>
                )}

                {qaList.map((item, idx) => (
                  <div key={idx} onClick={() => setSelectedIdx(idx)} style={{
                    padding: "14px 16px", borderBottom: "1px solid #f1f5f9", cursor: "pointer",
                    background: selectedIdx === idx ? "linear-gradient(90deg, #eef4ff, #f0f7ff)" : "transparent",
                    borderLeft: selectedIdx === idx ? "3px solid #2563eb" : "3px solid transparent",
                    transition: "all 0.12s", display: "flex", alignItems: "flex-start", gap: 10,
                  }}
                    onMouseOver={(e) => { if (selectedIdx !== idx) e.currentTarget.style.background = "#fafbfc"; }}
                    onMouseOut={(e) => { if (selectedIdx !== idx) e.currentTarget.style.background = "transparent"; }}
                  >
                    <div style={{
                      width: 24, height: 24, borderRadius: 7, flexShrink: 0,
                      background: selectedIdx === idx ? "linear-gradient(135deg, #1e3a5f, #2d5a87)" : "#e2e8f0",
                      color: selectedIdx === idx ? "#fff" : "#64748b",
                      fontSize: 11, fontWeight: 700, display: "flex",
                      alignItems: "center", justifyContent: "center", transition: "all 0.12s",
                    }}>{idx + 1}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{
                        fontSize: 13, fontWeight: selectedIdx === idx ? 600 : 400,
                        color: selectedIdx === idx ? "#0f172a" : "#334155",
                        margin: 0, lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis",
                        display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical",
                      }}>{item.question}</p>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                        {item.loading && <span style={{ fontSize: 10.5, color: "#f59e0b", fontWeight: 500 }}>&#9679; 검색 중</span>}
                        {item.answer && !item.loading && <span style={{ fontSize: 10.5, color: "#22c55e", fontWeight: 500 }}>&#9679; 답변 완료</span>}
                        {item.error && <span style={{ fontSize: 10.5, color: "#ef4444", fontWeight: 500 }}>&#9679; 오류</span>}
                        {item.provider && !item.loading && (
                          <span style={{
                            fontSize: 9.5, color: PROVIDERS[item.provider]?.color || "#94a3b8",
                            fontWeight: 500, opacity: 0.7,
                          }}>{PROVIDERS[item.provider]?.label}</span>
                        )}
                      </div>
                    </div>
                    <button onClick={(e) => handleDelete(idx, e)} style={{
                      background: "none", border: "none", cursor: "pointer",
                      color: "#cbd5e1", fontSize: 14, padding: "0 2px",
                      lineHeight: 1, flexShrink: 0, transition: "color 0.12s",
                    }}
                      onMouseOver={(e) => e.currentTarget.style.color = "#ef4444"}
                      onMouseOut={(e) => e.currentTarget.style.color = "#cbd5e1"}
                    >&#10005;</button>
                  </div>
                ))}
              </div>

              {qaList.length > 0 && (
                <div style={{
                  padding: "10px 14px", borderTop: "1px solid #e2e8f0",
                  background: "#fafbfc", flexShrink: 0,
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>총 {qaList.length}건</span>
                  <button onClick={() => { setQaList([]); setSelectedIdx(null); }} style={{
                    fontSize: 11, color: "#94a3b8", background: "none",
                    border: "none", cursor: "pointer", textDecoration: "underline",
                  }}
                    onMouseOver={(e) => e.currentTarget.style.color = "#ef4444"}
                    onMouseOut={(e) => e.currentTarget.style.color = "#94a3b8"}
                  >전체 삭제</button>
                </div>
              )}
            </aside>

            {/* Right - 답변 영역 */}
            <main ref={answerRef} style={{ flex: 1, overflowY: "auto", background: "#f8fafb" }}>
              {selected === null && (
                <div style={{
                  height: "100%", display: "flex", flexDirection: "column",
                  alignItems: "center", justifyContent: "center", padding: 40,
                }}>
                  <div style={{
                    width: 80, height: 80, borderRadius: 24,
                    background: "linear-gradient(135deg, #1e3a5f 0%, #3b6d9e 100%)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    boxShadow: "0 12px 40px rgba(30,58,95,0.18)", marginBottom: 24,
                  }}>
                    <span style={{ fontSize: 40 }}>&#128203;</span>
                  </div>
                  <h2 style={{
                    fontFamily: "'Noto Serif KR', serif", fontSize: 20, fontWeight: 700,
                    color: "#0f172a", margin: "0 0 8px",
                  }}>회계기준 질의응답</h2>
                  <p style={{ fontSize: 13.5, color: "#94a3b8", textAlign: "center", lineHeight: 1.7, maxWidth: 360 }}>
                    왼쪽에서 질문을 입력하거나 예시 질문을 선택하세요.<br />
                    KASB, 국가법령정보센터, 사법정보공개포털을 검색하여 답변을 제공합니다.
                  </p>
                </div>
              )}

              {selected && (
                <div style={{ maxWidth: 780, margin: "0 auto", padding: "32px 36px 48px" }}>
                  <div style={{ marginBottom: 28, paddingBottom: 20, borderBottom: "2px solid #1e3a5f" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{
                        display: "inline-block", padding: "3px 10px",
                        background: "#1e3a5f", borderRadius: 5,
                        fontSize: 10.5, fontWeight: 600, color: "#fff",
                        letterSpacing: "0.04em", textTransform: "uppercase",
                      }}>Question #{selectedIdx + 1}</div>
                      {selected.provider && (
                        <div style={{
                          display: "inline-block", padding: "3px 10px",
                          background: PROVIDERS[selected.provider]?.color || "#94a3b8",
                          borderRadius: 5, fontSize: 10.5, fontWeight: 600, color: "#fff",
                          letterSpacing: "0.04em",
                        }}>{PROVIDERS[selected.provider]?.label}</div>
                      )}
                    </div>
                    <h2 style={{
                      fontFamily: "'Noto Serif KR', serif",
                      fontSize: 20, fontWeight: 700, color: "#0f172a",
                      margin: 0, lineHeight: 1.6,
                    }}>{selected.question}</h2>
                  </div>

                  {selected.loading && (
                    <div style={{ padding: "32px 24px", background: "#fff", borderRadius: 14, border: "1px solid #e2e8f0", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <TypingIndicator />
                      <p style={{ fontSize: 13, color: "#64748b", margin: "12px 0 0" }}>KASB · 국가법령정보센터 · 사법정보공개포털 자료를 검색하고 있습니다...</p>
                    </div>
                  )}

                  {selected.error && (
                    <div style={{ padding: "20px 24px", background: "#fef2f2", borderRadius: 14, border: "1px solid #fecaca" }}>
                      <p style={{ fontSize: 14, color: "#dc2626", margin: 0, fontWeight: 500 }}>오류가 발생했습니다: {selected.error}</p>
                      {selected.error.includes("API Key") && (
                        <button onClick={() => setShowKeyModal(true)} style={{
                          marginTop: 12, padding: "8px 16px", fontSize: 13,
                          color: "#dc2626", background: "#fff",
                          border: "1px solid #fecaca", borderRadius: 8, cursor: "pointer",
                        }}>API Key 재설정</button>
                      )}
                    </div>
                  )}

                  {selected.answer && !selected.loading && (
                    <div style={{
                      padding: "28px 32px", background: "#fff", borderRadius: 14,
                      border: "1px solid #e2e8f0", boxShadow: "0 1px 6px rgba(0,0,0,0.04)",
                      fontSize: 14, lineHeight: 1.75, color: "#1e293b",
                    }}>
                      <div style={{
                        display: "flex", alignItems: "center", gap: 8,
                        marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid #f1f5f9",
                      }}>
                        <div style={{
                          width: 22, height: 22, borderRadius: 6,
                          background: "linear-gradient(135deg, #1e3a5f, #2d5a87)",
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          <span style={{ fontSize: 11, color: "#fff" }}>A</span>
                        </div>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b", letterSpacing: "0.04em", textTransform: "uppercase" }}>KASB · 법령 · 판례 기준 답변</span>
                      </div>
                      <FormatAnswer text={selected.answer} />
                    </div>
                  )}

                  <p style={{ fontSize: 11, color: "#94a3b8", textAlign: "center", marginTop: 24, lineHeight: 1.6 }}>
                    본 답변은 한국회계기준원(KASB), 국가법령정보센터(law.go.kr), 사법정보공개포털(portal.scourt.go.kr) 공식 자료를 기반으로 하나, 최종 판단은 전문가 확인이 필요합니다.
                  </p>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<KASBApp />);
  </script>
</body>
</html>
